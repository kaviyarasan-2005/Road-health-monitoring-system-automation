<!DOCTYPE html>
<html>
<head>
<title>Public Dashboard</title>
<link rel="stylesheet" href="./style/publicStyle.css">
</head>

<body>

<div class="container">

<h1>Public Dashboard</h1>

<button id="openReportBtn" class="btn">New Report</button>

<h2>My Reports</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Image</th>
<th>Description</th>
<th>Location</th>
<th>Status</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

<!-- Modal -->
<div id="reportModal" class="modal">

<div class="modal-content">

<span id="closeModal" class="close">&times;</span>

<h2>Submit New Report</h2>

<form id="reportForm">

<label>Image</label>
<input type="file" id="imageInput" required>

<label>Description</label>
<textarea id="description"></textarea>

<label>Location</label>
<div class="location-box">
  <input type="text" id="location" placeholder="Location will appear here">

  <button type="button" id="getLocationBtn" class="location-btn">
    Get Location
  </button>
</div>
<br>

<button type="submit" class="btn">Submit Report</button>

</form>

<p id="message"></p>

</div>
</div>

<script src="./script/publicsScript.js"></script>

</body>
</html>
