<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - Road Monitor</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(120deg,#43e97b,#38f9d7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#43e97b;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2ecc71;
}

.link{
    margin-top:15px;
}

#message{
    margin-top:10px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Signup</button>

<p class="link">
Already have an account? <a href="login.html">Login</a>
</p>

</form>

<p id="message"></p>

</div>

<script src="signup.js"></script>
</body>
</html>
